name: Build RustDesk Windows

on:
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: RustDesk branch, tag, or commit
        required: true
        default: master
      upload_release:
        description: Upload to GitHub Release
        required: true
        default: "false"
      package_selfhost_config:
        description: Generate self-hosted deployment scripts from split self-host secrets
        required: true
        default: "true"
  push:
    branches:
      - main
      - master

env:
  CARGO_TERM_COLOR: always
  VCPKG_ROOT: C:\vcpkg
  RUST_VERSION: 1.75
  FLUTTER_VERSION: 3.24.5
  LLVM_VERSION: 15.0.6
  VCPKG_DEFAULT_TRIPLET: x64-windows-static
  VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Resolve RustDesk ref
        id: ref
        shell: pwsh
        run: |
          $ref = "${{ github.event.inputs.rustdesk_ref }}"
          if ([string]::IsNullOrWhiteSpace($ref)) {
            $ref = "master"
          }
          "value=$ref" >> $env:GITHUB_OUTPUT

      - name: Checkout RustDesk source
        uses: actions/checkout@v4
        with:
          repository: rustdesk/rustdesk
          ref: ${{ steps.ref.outputs.value }}
          path: rustdesk
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            rustdesk\target
          key: ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('rustdesk/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-
            ${{ runner.os }}-cargo-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Set LIBCLANG_PATH
        shell: pwsh
        run: |
          "LIBCLANG_PATH=$env:LLVM_PATH\bin" >> $env:GITHUB_ENV
          "PATH=$env:LLVM_PATH\bin;$env:PATH" >> $env:GITHUB_ENV

      - name: Install NASM
        shell: pwsh
        run: |
          choco install nasm -y --no-progress

      - name: Install Strawberry Perl
        shell: pwsh
        run: |
          choco install strawberryperl -y --no-progress

      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path $env:VCPKG_ROOT)) {
            git clone https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
          }
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics

      - name: Install vcpkg dependencies
        shell: pwsh
        working-directory: rustdesk
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet $env:VCPKG_DEFAULT_TRIPLET --x-install-root="$env:VCPKG_ROOT\installed"

      - name: Flutter doctor
        shell: pwsh
        run: |
          flutter --version
          flutter doctor -v

      - name: Replace engine with RustDesk custom Flutter engine
        shell: pwsh
        run: |
          flutter precache --windows
          $engineRoot = "C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release"
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          Copy-Item windows-x64-release\* $engineRoot -Recurse -Force

      - name: Show tool versions
        shell: pwsh
        run: |
          rustc -Vv
          cargo -V
          python --version
          git --version
          clang --version

      - name: Run build script
        shell: pwsh
        working-directory: rustdesk
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          LIBCLANG_PATH: ${{ env.LIBCLANG_PATH }}
        run: |
          ..\scripts\build.ps1

      - name: Resolve self-hosted config
        id: selfhost
        if: ${{ github.event.inputs.package_selfhost_config != 'false' }}
        shell: pwsh
        env:
          RUSTDESK_CONFIG: ${{ secrets.RUSTDESK_CONFIG }}
          RUSTDESK_HOST: ${{ secrets.RUSTDESK_HOST }}
          RUSTDESK_RELAY: ${{ secrets.RUSTDESK_RELAY }}
          RUSTDESK_API: ${{ secrets.RUSTDESK_API }}
          RUSTDESK_KEY: ${{ secrets.RUSTDESK_KEY }}
        run: |
          function Normalize-Value([string]$value) {
            if ($null -eq $value) {
              return ''
            }
            return $value.Trim()
          }

          $configString = ''
          $source = ''
          $host = Normalize-Value $env:RUSTDESK_HOST
          $relay = Normalize-Value $env:RUSTDESK_RELAY
          $api = Normalize-Value $env:RUSTDESK_API
          $key = Normalize-Value $env:RUSTDESK_KEY
          $rawConfig = Normalize-Value $env:RUSTDESK_CONFIG

          if (-not [string]::IsNullOrWhiteSpace($host) -or -not [string]::IsNullOrWhiteSpace($key) -or -not [string]::IsNullOrWhiteSpace($relay) -or -not [string]::IsNullOrWhiteSpace($api)) {
            if ([string]::IsNullOrWhiteSpace($host) -or [string]::IsNullOrWhiteSpace($key)) {
              throw 'Self-host split secrets are incomplete. RUSTDESK_HOST and RUSTDESK_KEY are required when using split secrets.'
            }

            $config = [ordered]@{
              host = $host
              relay = $relay
              api = $api
              key = $key
            }
            $json = $config | ConvertTo-Json -Compress
            $base64 = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($json)).TrimEnd('=')
            $base64 = $base64.Replace('+', '-').Replace('/', '_')
            $chars = $base64.ToCharArray()
            [Array]::Reverse($chars)
            $configString = -join $chars
            $source = 'RUSTDESK_HOST/RUSTDESK_KEY'
          } elseif (-not [string]::IsNullOrWhiteSpace($rawConfig)) {
            $configString = $rawConfig
            $source = 'RUSTDESK_CONFIG'
          }

          if ([string]::IsNullOrWhiteSpace($configString)) {
            'enabled=false' >> $env:GITHUB_OUTPUT
          } else {
            "enabled=true" >> $env:GITHUB_OUTPUT
            "source=$source" >> $env:GITHUB_OUTPUT
            "value<<EOF" >> $env:GITHUB_OUTPUT
            $configString >> $env:GITHUB_OUTPUT
            "EOF" >> $env:GITHUB_OUTPUT
          }

      - name: Generate self-hosted deployment scripts
        if: ${{ steps.selfhost.outputs.enabled == 'true' }}
        shell: pwsh
        env:
          RUSTDESK_CONFIG: ${{ steps.selfhost.outputs.value }}
        run: |
          $installer = Get-ChildItem -Path rustdesk -Filter 'rustdesk-*-install.exe' | Select-Object -First 1
          if (-not $installer) {
            throw 'Installer artifact not found under rustdesk root.'
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $psScript = @"
$ErrorActionPreference = 'Stop'

$installer = Join-Path $PSScriptRoot '$($installer.Name)'
$config = @'
$env:RUSTDESK_CONFIG
'@

if (-not (Test-Path $installer)) {
    throw "Installer not found: $installer"
}

Start-Process -FilePath $installer -ArgumentList '--silent-install' -Wait

$rustdeskExe = Join-Path $env:ProgramFiles 'RustDesk\rustdesk.exe'
if (-not (Test-Path $rustdeskExe)) {
    throw "Installed rustdesk.exe not found: $rustdeskExe"
}

& $rustdeskExe --config $config
Write-Host 'RustDesk self-hosted config imported.'
"@

          $batScript = @"
@echo off
setlocal
set "INSTALLER=%~dp0$($installer.Name)"
set "RUSTDESK_EXE=%ProgramFiles%\RustDesk\rustdesk.exe"

if not exist "%INSTALLER%" (
  echo Installer not found: %INSTALLER%
  exit /b 1
)

start /wait "" "%INSTALLER%" --silent-install

if not exist "%RUSTDESK_EXE%" (
  echo Installed rustdesk.exe not found: %RUSTDESK_EXE%
  exit /b 1
)

"%RUSTDESK_EXE%" --config "$env:RUSTDESK_CONFIG"
echo RustDesk self-hosted config imported.
"@

          Set-Content -Path 'dist\install-selfhosted.ps1' -Value $psScript -Encoding ASCII
          Set-Content -Path 'dist\install-selfhosted.bat' -Value $batScript -Encoding ASCII
          Set-Content -Path 'dist\selfhost-config-source.txt' -Value "Config source: ${{ steps.selfhost.outputs.source }}" -Encoding ASCII

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          Get-ChildItem -Path rustdesk -Filter 'rustdesk-*-install.exe' -ErrorAction SilentlyContinue |
            Copy-Item -Destination 'dist\' -Force

          if (Test-Path "rustdesk\flutter\build\windows\x64\runner\Release") {
            Copy-Item "rustdesk\flutter\build\windows\x64\runner\Release\*" "dist\" -Recurse -Force
          }

          if (Test-Path "rustdesk\target\release\dylib_virtual_display.dll") {
            Copy-Item "rustdesk\target\release\dylib_virtual_display.dll" "dist\" -Force
          }

      - name: Create distributable zip
        shell: pwsh
        run: |
          $bundleName = "rustdesk-windows-${{ steps.ref.outputs.value }}-bundle.zip"
          if (Test-Path $bundleName) {
            Remove-Item $bundleName -Force
          }
          Compress-Archive -Path dist\* -DestinationPath $bundleName -CompressionLevel Optimal

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-${{ steps.ref.outputs.value }}
          path: |
            dist
            rustdesk-windows-${{ steps.ref.outputs.value }}-bundle.zip

      - name: Create Release
        if: ${{ github.event.inputs.upload_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rustdesk-${{ steps.ref.outputs.value }}
          name: RustDesk ${{ steps.ref.outputs.value }}
          files: |
            dist/**/*
            rustdesk-windows-${{ steps.ref.outputs.value }}-bundle.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build RustDesk Windows

on:
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: RustDesk branch, tag, or commit
        required: true
        default: master
      upload_release:
        description: Upload to GitHub Release
        required: true
        default: "false"
      package_selfhost_config:
        description: Generate self-hosted deployment scripts from split self-host secrets
        required: true
        default: 'true'
  push:
    branches:
      - main
      - master

env:
  CARGO_TERM_COLOR: 'always'
  VCPKG_ROOT: 'C:\vcpkg'
  RUST_VERSION: '1.75'
  FLUTTER_VERSION: '3.24.5'
  LLVM_VERSION: '15.0.6'
  NASM_VERSION: '2.16.03'
  VCPKG_COMMIT_ID: '120deac3062162151622ca4860575a33844ba10b'
  VCPKG_DEFAULT_TRIPLET: 'x64-windows-static'
  VCPKG_DEFAULT_HOST_TRIPLET: 'x64-windows-static'

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Resolve RustDesk ref
        id: ref
        shell: pwsh
        run: |
          $ref = "${{ github.event.inputs.rustdesk_ref }}"
          if ([string]::IsNullOrWhiteSpace($ref)) {
            $ref = "master"
          }
          "value=$ref" >> $env:GITHUB_OUTPUT

      - name: Checkout RustDesk source
        uses: actions/checkout@v4
        with:
          repository: rustdesk/rustdesk
          ref: ${{ steps.ref.outputs.value }}
          path: rustdesk
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            rustdesk\target
          key: ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('rustdesk/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-
            ${{ runner.os }}-cargo-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Set LIBCLANG_PATH
        shell: pwsh
        run: |
          "LIBCLANG_PATH=$env:LLVM_PATH\bin" >> $env:GITHUB_ENV
          "PATH=$env:LLVM_PATH\bin;$env:PATH" >> $env:GITHUB_ENV

      - name: Install NASM
        shell: pwsh
        run: |
          choco install nasm --version $env:NASM_VERSION -y --no-progress

          $nasmCommand = Get-Command nasm -ErrorAction SilentlyContinue
          if (-not $nasmCommand) {
            $candidatePaths = @(
              (Join-Path $env:ProgramFiles 'NASM'),
              (Join-Path ${env:ProgramFiles(x86)} 'NASM'),
              (Join-Path $env:ChocolateyInstall 'bin')
            ) | Where-Object { $_ -and (Test-Path $_) }

            foreach ($candidate in $candidatePaths) {
              $env:PATH = "$candidate;$env:PATH"
              $nasmCommand = Get-Command nasm -ErrorAction SilentlyContinue
              if ($nasmCommand) {
                break
              }
            }
          }

          if (-not $nasmCommand) {
            throw 'NASM was installed but nasm.exe was not found in PATH.'
          }

          $nasmDir = Split-Path -Parent $nasmCommand.Source
          $env:PATH = "$nasmDir;$env:PATH"
          $nasmDir >> $env:GITHUB_PATH
          "NASM_EXE=$($nasmCommand.Source)" >> $env:GITHUB_ENV
          nasm -v

      - name: Install Strawberry Perl
        shell: pwsh
        run: |
          choco install strawberryperl -y --no-progress

      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path $env:VCPKG_ROOT)) {
            git clone https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
          }
          Push-Location $env:VCPKG_ROOT
          git fetch --depth 1 origin $env:VCPKG_COMMIT_ID
          git reset --hard $env:VCPKG_COMMIT_ID
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics
          Pop-Location

      - name: Show vcpkg toolchain info
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" version
          Write-Host "Pinned vcpkg commit: $env:VCPKG_COMMIT_ID"
          nasm -v

      - name: Install vcpkg dependencies
        shell: pwsh
        working-directory: rustdesk
        run: |
          $vcpkg = "$env:VCPKG_ROOT\vcpkg.exe"
          & $vcpkg install --triplet $env:VCPKG_DEFAULT_TRIPLET --x-install-root="$env:VCPKG_ROOT\installed"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "==> vcpkg install failed; dumping recent build logs"
            Get-ChildItem "$env:VCPKG_ROOT\buildtrees" -Recurse -Filter *.log -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 10 |
              ForEach-Object {
                Write-Host "----- $($_.FullName) -----"
                Get-Content $_.FullName -Tail 80 -ErrorAction SilentlyContinue
              }
            exit $LASTEXITCODE
          }

      - name: Flutter doctor
        shell: pwsh
        run: |
          flutter --version
          flutter doctor -v

      - name: Replace engine with RustDesk custom Flutter engine
        shell: pwsh
        run: |
          flutter precache --windows
          $engineRoot = "C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release"
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          Copy-Item windows-x64-release\* $engineRoot -Recurse -Force

      - name: Show tool versions
        shell: pwsh
        run: |
          rustc -Vv
          cargo -V
          python --version
          git --version
          clang --version
          nasm -v

      - name: Run build script
        shell: pwsh
        working-directory: rustdesk
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          LIBCLANG_PATH: ${{ env.LIBCLANG_PATH }}
        run: |
          ..\scripts\build.ps1

      - name: Resolve self-hosted config
        id: selfhost
        if: ${{ github.event.inputs.package_selfhost_config != 'false' }}
        shell: pwsh
        env:
          RUSTDESK_CONFIG: ${{ secrets.RUSTDESK_CONFIG }}
          RUSTDESK_HOST: ${{ secrets.RUSTDESK_HOST }}
          RUSTDESK_RELAY: ${{ secrets.RUSTDESK_RELAY }}
          RUSTDESK_API: ${{ secrets.RUSTDESK_API }}
          RUSTDESK_KEY: ${{ secrets.RUSTDESK_KEY }}
        run: |
          ..\scripts\resolve-selfhost-config.ps1

      - name: Generate self-hosted deployment scripts
        if: ${{ steps.selfhost.outputs.enabled == 'true' }}
        shell: pwsh
        env:
          RUSTDESK_CONFIG: ${{ steps.selfhost.outputs.value }}
          RUSTDESK_CONFIG_SOURCE: ${{ steps.selfhost.outputs.source }}
        run: |
          ..\scripts\generate-selfhost-package.ps1

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          Get-ChildItem -Path rustdesk -Filter 'rustdesk-*-install.exe' -ErrorAction SilentlyContinue |
            Copy-Item -Destination 'dist\' -Force

          if (Test-Path "rustdesk\flutter\build\windows\x64\runner\Release") {
            Copy-Item "rustdesk\flutter\build\windows\x64\runner\Release\*" "dist\" -Recurse -Force
          }

          if (Test-Path "rustdesk\target\release\dylib_virtual_display.dll") {
            Copy-Item "rustdesk\target\release\dylib_virtual_display.dll" "dist\" -Force
          }

      - name: Create distributable zip
        shell: pwsh
        run: |
          $bundleName = "rustdesk-windows-${{ steps.ref.outputs.value }}-bundle.zip"
          if (Test-Path $bundleName) {
            Remove-Item $bundleName -Force
          }
          Compress-Archive -Path dist\* -DestinationPath $bundleName -CompressionLevel Optimal

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-${{ steps.ref.outputs.value }}
          path: |
            dist
            rustdesk-windows-${{ steps.ref.outputs.value }}-bundle.zip

      - name: Create Release
        if: ${{ github.event.inputs.upload_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rustdesk-${{ steps.ref.outputs.value }}
          name: RustDesk ${{ steps.ref.outputs.value }}
          files: |
            dist/**/*
            rustdesk-windows-${{ steps.ref.outputs.value }}-bundle.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}